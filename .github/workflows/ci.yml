name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: www } }
    env:
      DB_ENGINE: sqlite
      DJANGO_IS_PRODUCTION: "0"
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: www/requirements.txt }
      - name: Install system deps for mysqlclient
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config
      - run: pip install -r requirements.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py test api core whatsapp ia -v2
      - name: Deploy checks (informational only)
        run: DJANGO_IS_PRODUCTION=1 DJANGO_SECRET_KEY=ci-long-random-key-abcdef123456 python manage.py check --deploy || true

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npx ng build --base-href /painel/ --configuration production
      - run: npx ng test --watch=false --browsers=ChromeHeadless
